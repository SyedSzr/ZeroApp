<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ZeroApp Portal | Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'] },
          colors: {
            bg:'#09090e', surface:'#11111a', card:'#161622',
            border:'#252535', accent:'#7c6af7', muted:'#5a5a7a',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #09090e; color: #fff; scroll-behavior: smooth; }
    .glass { background: rgba(22, 22, 34, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .glow-purple { box-shadow: 0 0 30px rgba(124, 106, 247, 0.2); }
    .no-sb::-webkit-scrollbar { display: none; }
    input, textarea, select { background: #161622 !important; border-color: #252535 !important; color: #fff !important; }
    input:focus { border-color: #7c6af7 !important; outline: none; box-shadow: 0 0 0 2px rgba(124, 106, 247, 0.2); }
    .tab-active { background: rgba(124, 106, 247, 0.1); color: #7c6af7; font-weight: 700; border-right: 3px solid #7c6af7; }
  </style>
</head>
<body class="font-sans min-h-screen flex overflow-hidden">

  <!-- ── Sidebar ── -->
  <aside class="w-64 border-r border-border bg-surface flex flex-col h-screen">
    <div class="p-6 border-b border-border flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-accent flex items-center justify-center text-xl font-bold">⚡</div>
      <div>
        <h1 class="text-white font-black text-lg leading-none">ZeroApp</h1>
        <p class="text-muted text-[10px] uppercase tracking-widest mt-1">Admin Portal</p>
      </div>
    </div>
    
    <nav id="sidebar-nav" class="flex-1 p-4 space-y-1">
      <button data-route="dashboard" onclick="setRoute('dashboard')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-muted hover:text-white transition-all text-sm font-medium">
        <span>📊</span> Dashboard
      </button>
      <button data-route="apps" onclick="setRoute('apps')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-muted hover:text-white transition-all text-sm font-medium">
        <span>📱</span> App Catalog
      </button>
      <button data-route="games" onclick="setRoute('games')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-muted hover:text-white transition-all text-sm font-medium">
        <span>🎮</span> Game Feed
      </button>
      <button data-route="categories" onclick="setRoute('categories')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-muted hover:text-white transition-all text-sm font-medium">
        <span>🏷️</span> Categories
      </button>
      <button data-route="sync" onclick="setRoute('sync')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-muted hover:text-white transition-all text-sm font-medium">
        <span>☁️</span> Sync Data
      </button>
      <div class="pt-6 pb-2 px-4 text-[10px] font-black text-muted uppercase tracking-[0.2em]">System</div>
      <button data-route="settings" onclick="setRoute('settings')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-muted hover:text-white transition-all text-sm font-medium">
        <span>⚙️</span> Configuration
      </button>
      <button onclick="testConnection(event)" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-muted hover:text-white transition-all text-sm font-medium border-t border-white/5 mt-4">
        <span>⚡</span> Test Connection
      </button>
    </nav>
    
    <div class="p-4 border-t border-border">
      <div class="flex items-center gap-3 px-3 py-2 bg-card rounded-xl border border-border">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-accent to-blue-400 flex items-center justify-center font-bold text-xs text-white">A</div>
        <div class="flex-1 min-w-0 text-left">
          <p class="text-white text-xs font-bold truncate">Ali Hassan</p>
          <p class="text-muted text-[10px] truncate">Cloud Administrator</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Main Content ── -->
  <main class="flex-1 flex flex-col h-screen overflow-hidden bg-bg">
    
    <!-- Real-time Status Header -->
    <header class="h-20 border-b border-border bg-surface/50 backdrop-blur-xl flex items-center justify-between px-8 flex-shrink-0">
      <div id="route-header">
        <h2 class="text-white font-bold text-lg">Dashboard Overview</h2>
        <p class="text-muted text-xs">Real-time stats from Supabase</p>
      </div>
      <div class="flex items-center gap-4">
        <div id="sync-status" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-bold transition-all opacity-0">
          <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
          Live Sync Active
        </div>
        <button id="main-add-btn" class="bg-accent hover:bg-accent/80 text-white font-bold text-sm px-6 py-2.5 rounded-xl transition-all shadow-lg glow-purple active:scale-95">
          + New Item
        </button>
      </div>
    </header>

    <!-- Content Area (Routed Views) -->
    <div id="view-container" class="flex-1 overflow-y-auto p-8 no-sb">
      <!-- Views will be injected here -->
    </div>
  </main>

  <!-- ── ITEM MODAL (Apps & Games) ── -->
  <div id="item-modal" class="fixed inset-0 z-50 flex items-center justify-center px-5 hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal('item-modal')"></div>
    <div class="bg-surface border border-border rounded-[40px] w-full max-w-[640px] relative z-10 shadow-2xl p-8 max-h-[90vh] overflow-y-auto no-sb">
      <h3 id="item-modal-title" class="text-2xl font-black text-white mb-6">Add New Item</h3>
      
      <div id="upload-status" class="hidden mb-6 p-4 rounded-2xl bg-accent/10 border border-accent/20">
        <div class="flex items-center justify-between mb-2">
          <span class="text-accent text-[10px] font-black uppercase tracking-widest" id="upload-msg">Uploading files...</span>
          <span class="text-accent text-xs font-bold" id="upload-percent">0%</span>
        </div>
        <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
          <div id="upload-bar" class="h-full bg-accent transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>

      <form id="item-form" class="space-y-6">
        <input type="hidden" name="type" value="apps"/>

        <!-- Approval Workflow Header -->
        <div id="approval-header" class="hidden p-4 rounded-[28px] border mb-6 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div id="status-icon-box" class="w-10 h-10 rounded-2xl flex items-center justify-center text-xl"></div>
            <div>
              <p id="status-label" class="text-white font-bold text-xs uppercase tracking-tight"></p>
              <p id="status-subtext" class="text-muted text-[10px]"></p>
            </div>
          </div>
          <div id="approval-buttons" class="flex gap-2">
            <button type="button" onclick="handleQuickApprove()" class="px-4 py-2 bg-emerald-500 text-white text-[10px] font-black uppercase rounded-xl shadow-lg shadow-emerald-500/20">Approve</button>
            <button type="button" onclick="toggleRejectInput(true)" class="px-4 py-2 bg-red-500 text-white text-[10px] font-black uppercase rounded-xl shadow-lg shadow-red-500/20">Reject</button>
          </div>
        </div>

        <div id="reject-box" class="hidden p-5 rounded-[28px] bg-red-500/5 border border-red-500/20 space-y-3">
          <label class="block text-red-400 text-[10px] font-black uppercase tracking-widest px-1">Rejection Comment</label>
          <textarea id="rejection-comment" class="w-full bg-bg border border-border rounded-xl p-3 text-white text-sm" placeholder="Why is this being rejected?"></textarea>
          <div class="flex justify-end gap-2">
            <button type="button" onclick="toggleRejectInput(false)" class="text-muted text-[10px] font-bold uppercase px-3">Cancel</button>
            <button type="button" onclick="handleQuickReject()" class="bg-red-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Confirm Reject</button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Internal ID</label>
            <input type="text" name="id" required class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="e.g. chatgpt"/>
          </div>
          <div>
            <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Display Name</label>
            <input type="text" name="name" required class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="e.g. ChatGPT"/>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">App Icon (Image)</label>
            <div class="flex items-center gap-3">
              <div id="icon-preview" class="w-12 h-12 rounded-2xl bg-card border border-border flex items-center justify-center text-2xl flex-shrink-0 overflow-hidden">
                <span class="text-muted">🖼️</span>
              </div>
              <input type="file" id="icon-input" accept="image/*" class="hidden" onchange="previewFile(this, 'icon-preview')"/>
              <button type="button" onclick="document.getElementById('icon-input').click()" class="flex-1 px-4 py-2.5 rounded-xl bg-card border border-border text-white text-[10px] font-bold uppercase hover:bg-white/5 transition-all">Select Icon</button>
            </div>
          </div>
          <div>
            <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Category</label>
            <select name="category_select" id="item-category-select" required class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm">
              <!-- Dynamically populated -->
            </select>
          </div>
        </div>

        <div id="game-only-fields" class="hidden">
          <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Featured Graphic (1024x500)</label>
          <div class="flex items-center gap-3">
            <div id="featured-preview" class="w-20 h-12 rounded-xl bg-card border border-border flex items-center justify-center overflow-hidden flex-shrink-0">
              <span class="text-muted text-[10px]">16:9</span>
            </div>
            <input type="file" id="featured-input" accept="image/*" class="hidden" onchange="previewFile(this, 'featured-preview')"/>
            <button type="button" onclick="document.getElementById('featured-input').click()" class="flex-1 px-4 py-2.5 rounded-xl bg-card border border-border text-white text-[10px] font-bold uppercase hover:bg-white/5 transition-all">Upload Featured Image</button>
          </div>
        </div>

        <div id="screenshot-fields">
          <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Screenshots (Up to 5)</label>
          <div class="flex flex-col gap-3">
            <div id="screenshots-preview" class="flex gap-2 overflow-x-auto no-sb py-1">
              <!-- Screenshot previews -->
            </div>
            <input type="file" id="screenshots-input" accept="image/*" multiple class="hidden" onchange="previewScreenshots(this)"/>
            <button type="button" onclick="document.getElementById('screenshots-input').click()" class="w-full px-4 py-2.5 rounded-xl bg-card border border-border text-white text-[10px] font-bold uppercase hover:bg-white/5 transition-all">+ Add Screenshots</button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Rating (0-5)</label>
            <input type="number" step="0.1" name="rating" required class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="4.8"/>
          </div>
          <div>
            <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Reviews Text</label>
            <input type="text" name="reviews" required class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="12.5K"/>
          </div>
        </div>

        <div class="flex items-center gap-3 p-4 rounded-2xl bg-accent/5 border border-accent/10">
          <input type="checkbox" name="is_featured" id="is-featured-check" class="w-5 h-5 rounded-lg bg-card border-border accent-accent cursor-pointer"/>
          <label for="is-featured-check" class="text-white text-sm font-bold cursor-pointer">Feature this item on Discover/Explore</label>
        </div>
        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Application URL</label>
            <input type="url" name="url" required class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="https://app.com"/>
          </div>
          <div>
            <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Tags (Comma separated)</label>
            <input type="text" name="tags" class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="ai, productivity, free"/>
          </div>
        </div>
        <div>
          <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Short Description</label>
          <textarea name="description" rows="2" class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="Short description for details page..."></textarea>
        </div>
        <div>
          <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Long Description</label>
          <textarea name="long_description" rows="5" class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm resize-none" placeholder="Full details, features, and app info..."></textarea>
        </div>
        <div class="flex gap-4 pt-4">
          <button type="button" onclick="closeModal('item-modal')" class="flex-1 py-4 rounded-2xl bg-card border border-border text-white font-bold">Cancel</button>
          <button type="submit" id="submit-btn" class="flex-1 py-4 rounded-2xl bg-accent text-white font-black shadow-lg glow-purple active:scale-95 transition-all">Push to Cloud</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── CATEGORY MODAL ── -->
  <div id="cat-modal" class="fixed inset-0 z-50 flex items-center justify-center px-5 hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal('cat-modal')"></div>
    <div class="bg-surface border border-border rounded-[40px] w-full max-w-[500px] relative z-10 shadow-2xl p-8 max-h-[90vh] overflow-y-auto no-sb">
      <h3 id="cat-modal-title" class="text-2xl font-black text-white mb-6">New Category</h3>
      <form id="cat-form" class="space-y-6">
        <div>
          <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Internal ID</label>
          <input type="text" name="id" required class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="e.g. puzzle"/>
        </div>
        <div>
          <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Display Label</label>
          <input type="text" name="label" required class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="e.g. Action Games"/>
        </div>
        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Emoji</label>
            <input type="text" name="emoji" required class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="🎮"/>
          </div>
          <div>
            <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Type</label>
            <select name="type" class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm">
              <option value="app">Apps Category</option>
              <option value="game">Games Category</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-muted text-[10px] font-black uppercase tracking-widest mb-2">Tailwind Gradient Classes</label>
          <input type="text" name="grad" required class="w-full px-4 py-3 rounded-2xl bg-card border border-border text-white text-sm" placeholder="from-blue-500 to-indigo-600"/>
        </div>
        <div class="flex gap-4 pt-4">
          <button type="button" onclick="closeModal('cat-modal')" class="flex-1 py-4 rounded-2xl bg-card border border-border text-white font-bold">Cancel</button>
          <button type="submit" class="flex-1 py-4 rounded-2xl bg-accent text-white font-black shadow-lg glow-purple active:scale-95">Save Category</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/admin.js" defer></script>
</body>
</html>
